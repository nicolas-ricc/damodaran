# Preset: qarp
# Quality at Reasonable Price (QARP) — late-Buffett style. Tightens quality
# requirements (lower leverage ceiling, stricter OCF consistency, tighter goodwill
# ratio, longer track record required); relaxes cheapness (value multiples at
# 0.9× sector median, FCF yield ≥ 5%, any one indicator suffices). Ranking
# weights tilt toward quality and growth. Trap detection layer is identical to
# damodaran_value.

quality_gates:
  rules:
    - name: min_market_cap
      args:
        min_usd: 100000000
    - name: min_years_history
      args:
        min_years: 7                 # tighter: longer track record required
    - name: exclude_sectors
      args:
        excluded:
          - Banks
          - Insurance
    - name: max_net_debt_to_ebitda
      args:
        max_ratio: 2.0               # tighter: Buffett prefers clean balance sheets
    - name: min_interest_coverage
      args:
        min_ratio: 3.0               # tighter: wider safety margin on interest
    - name: positive_operating_cashflow
      args:
        min_positive_years: 5        # tighter: must be cash-generative every single year
        lookback_years: 5
    - name: max_goodwill_to_assets
      args:
        max_ratio: 0.4               # tighter: less reliance on acquired intangibles

value_indicators:
  min_pass: 1
  rules:
    - name: pe_below_industry_multiple
      args:
        multiple: 0.9                # relaxed: willing to pay a premium for durable quality
    - name: ev_ebitda_below_industry_multiple
      args:
        multiple: 0.9
    - name: pbv_below_industry_multiple_with_roe_above_median
      args:
        pbv_multiple: 0.9
    - name: fcf_yield_above
      args:
        min_yield: 0.05              # relaxed: accepts lower yield for wide-moat businesses

trap_detection:
  rules:
    - name: revenue_not_declining
      args:
        min_avg_growth: -0.05
    - name: operating_margin_not_contracting
      args:
        max_contraction_bps: 200.0
    - name: roic_above_sector_wacc
    - name: sloan_accruals_below
      args:
        max_ratio: 0.10
    - name: share_count_not_diluting
      args:
        max_annual_growth: 0.05
    - name: auditor_changes_and_late_filings

ranking:
  weights:
    value: 0.20
    quality: 0.45                    # durability and moat quality drive the rank
    growth: 0.25
    margin_of_safety: 0.10
