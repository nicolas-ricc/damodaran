# QARP — Quality at a Reasonable Price screener preset — spec §6.6
# ("más Buffett-tardío").
#
# Philosophy: late-Buffett. A wonderful business at a fair price beats a fair
# business at a wonderful price. Versus the default damodaran_value preset this
# preset *tightens quality* (stronger balance-sheet floors and a mandatory
# return-on-equity-vs-book test) and *relaxes cheapness* (the value indicators
# accept paying up to ~the sector median rather than demanding a 0.7x discount).
# The ranking blend leans on quality. The eliminatory trap-detection layer is
# shared verbatim with damodaran_value, so a high-quality-looking compounder with
# deteriorating fundamentals is still rejected.
name: qarp

# --- Quality gates (eliminatory, spec §6.2) -------------------------------- #
# Tighter than the default: low leverage and strong interest coverage are the
# price of admission for a "quality" business.
quality_gates:
  rules:
    - name: min_market_cap
      params:
        minimum_usd: 250000000.0   # USD 250M floor (vs 100M default)
    - name: min_years_history
      params:
        minimum_years: 5
    - name: exclude_sectors
      params:
        excluded: [bank, insurance]
    - name: max_net_debt_to_ebitda
      params:
        maximum: 2.5               # tighter leverage cap than default 4.0
    - name: min_interest_coverage
      params:
        minimum: 4.0               # EBIT / Interest > 4.0 (vs 2.0 default)
    - name: positive_operating_cashflow
      params:
        min_positive: 5            # positive OCF in ALL of last 5 years
        window: 5
    - name: max_goodwill_to_assets
      params:
        maximum: 0.5

# --- Value indicators (at least one must pass, spec §6.3) ------------------ #
# "Reasonable" price, not cheap: accept paying up to roughly the sector median.
# The P/BV-with-ROE test is the quality-at-a-price anchor.
value_indicators:
  rules:
    - name: pbv_below_industry_multiple_with_roe_above_median
      params:
        multiple: 1.2              # P/BV < 1.2x median AND ROE > median (quality)
    - name: pe_below_industry_multiple
      params:
        multiple: 1.0              # PE up to the sector median is acceptable
    - name: fcf_yield_above
      params:
        minimum: 0.05              # FCF yield > 5% (vs 8% default) — pay for quality

# --- Trap detection (eliminatory, spec §6.4) ------------------------------- #
# Shared verbatim with damodaran_value — same "cheap for a reason" filters.
trap_detection:
  rules:
    - name: revenue_not_declining
      params:
        max_decline: -0.05
        window: 3
    - name: operating_margin_not_contracting
      params:
        max_contraction_bps: -200.0
        window: 3
    - name: roic_above_sector_wacc
    - name: sloan_accruals_below
      params:
        maximum: 0.10
    - name: share_count_not_diluting
      params:
        max_annual_growth: 0.05
    - name: auditor_changes_and_late_filings

# --- Ranking score weights (spec §6.5) ------------------------------------- #
# Quality dominates; growth still matters (a compounder grows); value matters
# least because we have already accepted a reasonable (not deep) price.
ranking:
  weights:
    value: 0.20
    quality: 0.45
    growth: 0.25
    margin_of_safety: 0.10
